name: hindsight

services:
  hindsight:
    build: .
    image: hindsight:latest
    stop_grace_period: 45s
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      HINDSIGHT_API_LLM_PROVIDER: "${HINDSIGHT_API_LLM_PROVIDER:-llamacpp}"
      HINDSIGHT_API_LLM_MODEL: "${HINDSIGHT_API_LLM_MODEL:-gpt-oss-20b}"
      HINDSIGHT_API_RETAIN_LLM_PROVIDER: "${HINDSIGHT_API_RETAIN_LLM_PROVIDER:-llamacpp}"
      HINDSIGHT_API_RETAIN_LLM_MODEL: "${HINDSIGHT_API_RETAIN_LLM_MODEL:-gpt-oss-20b}"
      HINDSIGHT_API_REFLECT_LLM_PROVIDER: "${HINDSIGHT_API_REFLECT_LLM_PROVIDER:-llamacpp}"
      HINDSIGHT_API_REFLECT_LLM_MODEL: "${HINDSIGHT_API_REFLECT_LLM_MODEL:-gpt-oss-20b}"
      HINDSIGHT_API_CONSOLIDATION_LLM_PROVIDER: "${HINDSIGHT_API_CONSOLIDATION_LLM_PROVIDER:-llamacpp}"
      HINDSIGHT_API_CONSOLIDATION_LLM_MODEL: "${HINDSIGHT_API_CONSOLIDATION_LLM_MODEL:-gpt-oss-20b}"
      HINDSIGHT_API_LLAMACPP_MODEL_PATH: "${HINDSIGHT_API_LLAMACPP_MODEL_PATH:-/home/hindsight/.hindsight/models/gpt-oss-20b-mxfp4.gguf}"
      HINDSIGHT_API_LLAMACPP_GPU_LAYERS: "${HINDSIGHT_API_LLAMACPP_GPU_LAYERS:-0}"
      HINDSIGHT_API_LLAMACPP_CONTEXT_SIZE: "${HINDSIGHT_API_LLAMACPP_CONTEXT_SIZE:-16384}"
      HINDSIGHT_API_LLAMACPP_EXTRA_ARGS: "${HINDSIGHT_API_LLAMACPP_EXTRA_ARGS:---n_threads 8}"
      HINDSIGHT_API_RETAIN_MAX_COMPLETION_TOKENS: "${HINDSIGHT_API_RETAIN_MAX_COMPLETION_TOKENS:-8192}"
      HINDSIGHT_API_LLM_MAX_CONCURRENT: "${HINDSIGHT_API_LLM_MAX_CONCURRENT:-1}"
      HINDSIGHT_API_LLM_TIMEOUT: "${HINDSIGHT_API_LLM_TIMEOUT:-900}"
      HINDSIGHT_API_ENABLE_OBSERVATIONS: "${HINDSIGHT_API_ENABLE_OBSERVATIONS:-true}"
      HINDSIGHT_API_WORKER_ID: "${HINDSIGHT_API_WORKER_ID:-hindsight-local}"
    volumes:
      - ${HOME}/.hindsight/data:/home/hindsight/.pg0
      - ${HOME}/.hindsight/cache:/home/hindsight/.cache/huggingface
      - ${HOME}/.hindsight/models:/home/hindsight/.hindsight/models
