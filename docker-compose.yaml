name: hindsight

services:
  hindsight:
    build: .
    image: hindsight:latest
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      HINDSIGHT_API_LLM_PROVIDER: openrouter
      HINDSIGHT_API_LLM_API_KEY: "${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY in your shell or .env}"
      HINDSIGHT_API_LLM_MODEL: "${HINDSIGHT_API_LLM_MODEL:-openai/gpt-oss-20b}"
      HINDSIGHT_API_RETAIN_LLM_PROVIDER: "${HINDSIGHT_API_RETAIN_LLM_PROVIDER:-openrouter}"
      HINDSIGHT_API_RETAIN_LLM_MODEL: "${HINDSIGHT_API_RETAIN_LLM_MODEL:-openai/gpt-oss-20b}"
      HINDSIGHT_API_REFLECT_LLM_PROVIDER: "${HINDSIGHT_API_REFLECT_LLM_PROVIDER:-openrouter}"
      HINDSIGHT_API_REFLECT_LLM_MODEL: "${HINDSIGHT_API_REFLECT_LLM_MODEL:-openai/gpt-oss-120b}"
      HINDSIGHT_API_CONSOLIDATION_LLM_PROVIDER: "${HINDSIGHT_API_CONSOLIDATION_LLM_PROVIDER:-openrouter}"
      HINDSIGHT_API_CONSOLIDATION_LLM_MODEL: "${HINDSIGHT_API_CONSOLIDATION_LLM_MODEL:-openai/gpt-oss-20b}"
      HINDSIGHT_API_LLM_EXTRA_BODY: '{"reasoning":{"effort":"high"}}'
      HINDSIGHT_API_LLM_MAX_CONCURRENT: "${HINDSIGHT_API_LLM_MAX_CONCURRENT:-4}"
      HINDSIGHT_API_LLM_TIMEOUT: "${HINDSIGHT_API_LLM_TIMEOUT:-300}"
      HINDSIGHT_API_ENABLE_OBSERVATIONS: "${HINDSIGHT_API_ENABLE_OBSERVATIONS:-true}"
    volumes:
      - ${HOME}/.hindsight/data:/home/hindsight/.pg0
      - ${HOME}/.hindsight/cache:/home/hindsight/.cache/huggingface
